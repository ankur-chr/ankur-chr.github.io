<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inside the Model logo">
  <title>Inside the Model</title>
  <desc>A dark model chip containing a coordinate grid, a glowing belief-trail, and a located agent node.</desc>
  <defs>
    <linearGradient id="trail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#6ee7ff" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#6ee7ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#b794ff" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7ff"/>
      <stop offset="1" stop-color="#b794ff"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.62" cy="0.30" r="0.95">
      <stop offset="0" stop-color="#0d1326"/>
      <stop offset="1" stop-color="#05070e"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card"><rect x="28" y="28" width="456" height="456" rx="112"/></clipPath>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#bg)"/>

  <g clip-path="url(#card)" stroke="#6ee7ff" stroke-opacity="0.08" stroke-width="2">
    <line x1="120" y1="28" x2="120" y2="484"/>
    <line x1="188" y1="28" x2="188" y2="484"/>
    <line x1="256" y1="28" x2="256" y2="484"/>
    <line x1="324" y1="28" x2="324" y2="484"/>
    <line x1="392" y1="28" x2="392" y2="484"/>
    <line x1="28" y1="120" x2="484" y2="120"/>
    <line x1="28" y1="188" x2="484" y2="188"/>
    <line x1="28" y1="256" x2="484" y2="256"/>
    <line x1="28" y1="324" x2="484" y2="324"/>
    <line x1="28" y1="392" x2="484" y2="392"/>
  </g>

  <g fill="#8aa0d8" fill-opacity="0.30">
    <circle cx="120" cy="120" r="5"/><circle cx="188" cy="120" r="5"/><circle cx="256" cy="120" r="5"/><circle cx="324" cy="120" r="5"/><circle cx="392" cy="120" r="5"/>
    <circle cx="120" cy="188" r="5"/><circle cx="188" cy="188" r="5"/><circle cx="256" cy="188" r="5"/><circle cx="324" cy="188" r="5"/><circle cx="392" cy="188" r="5"/>
    <circle cx="120" cy="256" r="5"/><circle cx="188" cy="256" r="5"/><circle cx="256" cy="256" r="5"/><circle cx="324" cy="256" r="5"/><circle cx="392" cy="256" r="5"/>
    <circle cx="120" cy="324" r="5"/><circle cx="188" cy="324" r="5"/><circle cx="256" cy="324" r="5"/><circle cx="324" cy="324" r="5"/><circle cx="392" cy="324" r="5"/>
    <circle cx="120" cy="392" r="5"/><circle cx="188" cy="392" r="5"/><circle cx="256" cy="392" r="5"/><circle cx="324" cy="392" r="5"/><circle cx="392" cy="392" r="5"/>
  </g>

  <polyline points="120,392 120,324 188,324 188,256 256,256 256,188 324,188 324,120"
    fill="none" stroke="url(#trail)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <g fill="#6ee7ff" fill-opacity="0.9">
    <circle cx="120" cy="324" r="6"/><circle cx="188" cy="324" r="6"/><circle cx="188" cy="256" r="6"/>
    <circle cx="256" cy="256" r="6"/><circle cx="256" cy="188" r="6"/><circle cx="324" cy="188" r="6"/>
  </g>
  <circle cx="120" cy="392" r="7" fill="none" stroke="#6ee7ff" stroke-opacity="0.45" stroke-width="3"/>

  <circle cx="324" cy="120" r="27" fill="none" stroke="#6ee7ff" stroke-opacity="0.55" stroke-width="3"/>
  <circle cx="324" cy="120" r="17" fill="#6ee7ff" fill-opacity="0.35" filter="url(#glow)"/>
  <circle cx="324" cy="120" r="12" fill="#eafcff" filter="url(#glow)"/>

  <rect x="28" y="28" width="456" height="456" rx="112" fill="none" stroke="url(#edge)" stroke-opacity="0.6" stroke-width="3"/>
</svg>
